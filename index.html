<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep Talking and Nobody Explodes - Web Clone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="landing-page">
        <h1>Keep Talking and Nobody Explodes</h1>
        <div class="button-container">
            <button id="defuse-btn">Defuse the Bomb</button>
            <button id="manual-btn">Read the Manual</button>
        </div>
    </div>

    <!-- Manual Viewer Iframe Overlay -->
    <div id="manual-viewer">
        <button id="close-manual">Back to Main Menu</button>
        <iframe src="pdf/manual.pdf" type="application/pdf"></iframe>
    </div>

    <!-- Phase/Level Selection Modal -->
    <div id="level-modal" class="modal">
        <div class="modal-content">
            <h2>Select a Level</h2>
            
            <div class="phase-section">
                <div class="phase-title">Phase 1 (3 Modules)</div>
                <div class="level-list" id="phase1-levels">
                    <!-- Levels will be generated by JS -->
                </div>
            </div>

            <div class="phase-section">
                <div class="phase-title">Phase 2 (4 Modules)</div>
                <div class="level-list" id="phase2-levels">
                    <!-- Levels will be generated by JS -->
                </div>
            </div>

            <div class="phase-section">
                <div class="phase-title">Phase 3 (6 Modules)</div>
                <div class="level-list" id="phase3-levels">
                    <!-- Levels will be generated by JS -->
                </div>
            </div>

            <button id="close-modal">Cancel</button>
        </div>
    </div>

    <script src="js/main.js" type="module"></script>
</body>
</html>
