<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 3 - Defuse the Bomb</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="start-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 id="start-phase-title">Phase 3</h1>
        <p id="start-level-num">Level 1</p>
        <button id="begin-btn" style="padding: 1.5rem 3rem; font-size: 1.5rem; background-color: #080; margin-top: 20px;">READY</button>
    </div>

    <div id="game-container">
        <div id="level-indicator">Level: <span id="current-level">1</span></div>

        <div id="main-game-area">
            <!-- Left Info Panel -->
            <div id="info-panel">
                <h2>INSTRUCTIONS</h2>
                <div id="info-content">
                    <p>Intel gathering in progress...</p>
                </div>
            </div>

            <div id="bomb-container">

            <div id="bomb-hud">
                <div id="timer-display">5:00</div>
                <div id="strike-display"></div>
            </div>

            <div id="bomb-faces">
                <div id="face-front" class="bomb-face"></div>
                <div id="face-top" class="bomb-face" style="display: none;">
                    <div class="edgework-item">
                        <div id="edgework-batteries"></div>
                        <p>Batteries</p>
                    </div>
                </div>
                <div id="face-bottom" class="bomb-face" style="display: none;">
                    <div class="edgework-item">
                        <div id="edgework-indicators"></div>
                        <p>Indicators</p>
                    </div>
                </div>
                <div id="face-left" class="bomb-face" style="display: none;">
                    <div class="edgework-item">
                        <div id="edgework-sn"></div>
                        <p>Serial Number</p>
                    </div>
                </div>
                <div id="face-right" class="bomb-face" style="display: none;"><div class="edgework-item"><p>Empty Side</p></div></div>
                <div id="face-back" class="bomb-face" style="display: none;"><div class="edgework-item"><p>Bomb Back</p></div></div>
            </div>
        </div>
    </div> <!-- End main-game-area -->

    <!-- Comms Box -->
    <div id="landing-comms-box" class="comms-box">
        <div class="comms-header">INCOMING TRANSMISSION...</div>
        <div id="comms-text" class="comms-text"></div>
    </div>

        <div id="view-indicator">Viewing: FRONT</div>

        <div class="nav-controls">
            <button class="nav-btn btn-up" data-face="top">Flip Up</button>
            <button class="nav-btn btn-left" data-face="left">Flip Left</button>
            <button class="nav-btn btn-front" data-face="front">Front</button>
            <button class="nav-btn btn-right" data-face="right">Flip Right</button>
            <button class="nav-btn btn-down" data-face="bottom">Flip Down</button>
        </div>

        <div style="margin-top: 30px;">
            <button onclick="window.location.href='index.html'">Quit to Menu</button>
        </div>
    </div>

    <script type="module">
        import { GameEngine } from './js/GameEngine.js';
        import { UIManager } from './js/UIManager.js';
        import { ModuleRegistry } from './js/ModuleRegistry.js';
        import { AudioManager } from './js/AudioManager.js';
        import { Logger } from './js/Logger.js';
        import { CommentatorManager } from './js/commentator/CommentatorManager.js';
        import { CommsIndicator } from './js/commentator/CommsIndicator.js';
        import { AIExpert } from './js/AIExpert.js';

        window.onerror = function(message, source, lineno, colno, error) {
            console.error(`[PHASE 3 ERROR] ${message} at ${source}:${lineno}`);
        };

        document.addEventListener('DOMContentLoaded', () => {
            try {
                Logger.log("PHASE 3", "Initializing Level...");

                // Global Tactile Click
                document.addEventListener('mousedown', () => {
                    if (!AudioManager.isInitialized) {
                        AudioManager.init();
                    }
                    AudioManager.playClick();
                });

                // Initialize AI Expert if mode is active
                const selectedMode = localStorage.getItem('selected_gamemode');
                const sessionKey = sessionStorage.getItem('groq_api_key');
                if (selectedMode === 'ai' && sessionKey) {
                    AIExpert.init(sessionKey);
                    const box = document.getElementById('landing-comms-box');
                    const commsText = document.getElementById('comms-text');
                    if (box && commsText) {
                        box.classList.add('active');
                        const hint = document.createElement('div');
                        hint.className = 'ptt-hint';
                        hint.innerHTML = 'Hold <b>[SPACEBAR]</b> to Transmit';
                        box.appendChild(hint);
                    }
                }

                // Initialize Comms Indicator in HUD
                const hud = document.getElementById('bomb-hud');
                new CommsIndicator(hud);
                
                const urlParams = new URLSearchParams(window.location.search);
                const level = urlParams.get('level') || "1";
                Logger.log("PHASE 3", `Received level: ${level}`);

                document.getElementById('start-level-num').textContent = `Level ${level}`;
                if (document.getElementById('current-level')) {
                    document.getElementById('current-level').textContent = level;
                }

                // Hide Status Report if not Level 1
                if (level !== "1") {
                    if (document.getElementById('info-panel')) {
                        document.getElementById('info-panel').style.display = 'none';
                    }
                } else {
                    const infoContent = document.getElementById('info-content');
                    if (infoContent) {
                        infoContent.innerHTML = `
                            <p><strong>INTEL: CRISIS</strong></p>
                            <ul style="padding-left: 15px; margin-top: 10px;">
                                <li><strong>1. 10 Seconds:</strong> Names lock in 10s. GO FAST.</li>
                                <li><strong>2. Edgework:</strong> Expert needs Serial, Batteries, and Indicators.</li>
                                <li><strong>3. Morse:</strong> Relay patterns (dots/dashes) after green flash.</li>
                                <li><strong>4. Strategy:</strong> Clear easy modules first.</li>
                            </ul>
                        `;
                    }
                }

                if (level === "1") {
                    setTimeout(() => {
                        CommentatorManager.speak('phase3_intel');
                    }, 500);
                }

                const beginBtn = document.getElementById('begin-btn');
                beginBtn.onclick = async () => {
                    try {
                        console.log("[PHASE 3] Starting Mission...");
                        const overlay = document.getElementById('start-overlay');
                        if (overlay) {
                            overlay.setAttribute('style', 'display: none !important');
                        }
                        
                        AudioManager.init();
                        await AudioManager.resume();
                        AudioManager.playClick(); 

                        const strikesLimit = level === "5" ? 1 : 2;
                        GameEngine.init(6, strikesLimit);
                        UIManager.init();
                        ModuleRegistry.injectModules('face-front', 6, 3);
                    } catch (err) {
                        console.error("[PHASE 3] Failed to start mission", err);
                    }
                };
            } catch (err) {
                Logger.error("PHASE 3", "Initialization failed", err);
            }
        });
    </script>
</body>
</html>
