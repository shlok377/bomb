<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 3 - Defuse the Bomb</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="start-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 id="start-phase-title">Phase 3</h1>
        <p id="start-level-num">Level 1</p>
        <button id="begin-btn" style="padding: 1.5rem 3rem; font-size: 1.5rem; background-color: #080; margin-top: 20px;">READY</button>
    </div>

    <div id="game-container">
        <div id="level-indicator">Level: <span id="current-level">1</span></div>

        <div id="main-game-area">
            <!-- Left Info Panel -->
            <div id="info-panel">
                <h2>INSTRUCTIONS</h2>
                <div id="info-content">
                    <p>Intel gathering in progress...</p>
                </div>
            </div>

            <div id="bomb-container">

            <div id="bomb-hud">
                <div id="timer-display">5:00</div>
                <div id="strike-display"></div>
            </div>

            <div id="bomb-faces">
                <div id="face-front" class="bomb-face"></div>
                <div id="face-top" class="bomb-face" style="display: none;">
                    <div class="edgework-item">
                        <div id="edgework-batteries"></div>
                        <p>Batteries</p>
                    </div>
                </div>
                <div id="face-bottom" class="bomb-face" style="display: none;">
                    <div class="edgework-item">
                        <div id="edgework-indicators"></div>
                        <p>Indicators</p>
                    </div>
                </div>
                <div id="face-left" class="bomb-face" style="display: none;">
                    <div class="edgework-item">
                        <div id="edgework-sn"></div>
                        <p>Serial Number</p>
                    </div>
                </div>
                <div id="face-right" class="bomb-face" style="display: none;"><div class="edgework-item"><p>Empty Side</p></div></div>
                <div id="face-back" class="bomb-face" style="display: none;"><div class="edgework-item"><p>Bomb Back</p></div></div>
            </div>
        </div>
    </div> <!-- End main-game-area -->

        <div id="view-indicator">Viewing: FRONT</div>

        <div class="nav-controls">
            <button class="nav-btn btn-up" data-face="top">Flip Up</button>
            <button class="nav-btn btn-left" data-face="left">Flip Left</button>
            <button class="nav-btn btn-front" data-face="front">Front</button>
            <button class="nav-btn btn-right" data-face="right">Flip Right</button>
            <button class="nav-btn btn-down" data-face="bottom">Flip Down</button>
        </div>

        <div style="margin-top: 30px;">
            <button onclick="window.location.href='index.html'">Quit to Menu</button>
        </div>
    </div>

    <script type="module">
        import { GameEngine } from './js/GameEngine.js';
        import { UIManager } from './js/UIManager.js';
        import { ModuleRegistry } from './js/ModuleRegistry.js';
        import { AudioManager } from './js/AudioManager.js';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const level = urlParams.get('level') || "1";
            
            document.getElementById('start-level-num').textContent = `Level ${level}`;
            if (document.getElementById('current-level')) {
                document.getElementById('current-level').textContent = level;
            }

            // Hide Status Report if not Level 1
            if (level !== "1") {
                document.getElementById('info-panel').style.display = 'none';
            } else {
                // Update Phase 3 specific info
                document.getElementById('info-content').innerHTML = `
                    <p><strong>INTEL: CRISIS MANAGEMENT</strong></p>
                    <ul style="padding-left: 15px; margin-top: 10px;">
                        <li><strong>10 Seconds:</strong> JUST 10 seconds is all it takes.</li>
                        <li><strong>Extreme Edgework:</strong> Advanced modules require perfect knowledge of batteries, serial number parity, AND lit indicators.</li>
                        <li><strong>Light Shape:</strong> For specialized modules (Morse), pattern start after a brief "Green" light, relay these patterns to your Expert. (e.g. dot bar bar, bar dot bar)</li>
                        <li><strong>Efficiency:</strong> You are handling 6 modules. Clear the simplest ones first to reduce visual noise.</li>
                    </ul>
                `;
            }

            document.getElementById('begin-btn').onclick = async () => {
                document.getElementById('start-overlay').style.display = 'none';
                
                // Initialize and Resume Audio (MUST happen in user gesture)
                AudioManager.init();
                await AudioManager.resume();
                AudioManager.playClick(); 

                // Phase 3 has 6 modules
                GameEngine.init(6);
                UIManager.init();
                ModuleRegistry.injectModules('face-front', 6, 3);
            };
        });
    </script>
</body>
</html>
